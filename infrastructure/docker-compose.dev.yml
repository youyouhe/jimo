name: lowcode-dev

# =============================================================
# Low-Code Platform — Development Environment
#
# Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f server
#   docker compose -f docker-compose.dev.yml down
# =============================================================

services:

  # ---------- PostgreSQL 16 (NestJS main DB) ----------
  postgres:
    image: postgres:16-alpine
    container_name: lowcode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lowcode_db}
      POSTGRES_USER: ${POSTGRES_USER:-lowcode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lowcode123}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lowcode} -d ${POSTGRES_DB:-lowcode_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - lowcode-net

  # ---------- MySQL 8 (bpm-service, Flowable) ----------
  mysql:
    image: mysql:8.0
    container_name: lowcode-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gin_vue_admin}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lowcode-net

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: lowcode-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lowcode-net

  # ---------- MinIO (object storage for file uploads) ----------
  minio:
    image: quay.io/minio/minio:latest
    container_name: lowcode-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lowcode-net

  # ---------- MinIO bucket init (creates lowcode-dev bucket, sets public read) ----------
  minio-init:
    image: quay.io/minio/mc:latest
    container_name: lowcode-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-lowcode-dev};
      mc anonymous set download local/${MINIO_BUCKET:-lowcode-dev};
      echo 'Bucket ready.';
      "
    networks:
      - lowcode-net

  # ---------- NestJS Backend (hot reload) ----------
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server.dev
    container_name: lowcode-server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lowcode}:${POSTGRES_PASSWORD:-lowcode123}@postgres:5432/${POSTGRES_DB:-lowcode_db}
      REDIS_URL: redis://redis:6379
      APP_PORT: 8888
      NODE_ENV: development
    ports:
      - "8888:8888"
    volumes:
      - ./apps/server/src:/app/apps/server/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lowcode-net

  # ---------- React Frontend (Umi dev server) ----------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web.dev
    container_name: lowcode-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/.umirc.ts:/app/apps/web/.umirc.ts:ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - lowcode-net

  # ---------- BPM Service (Flowable, reuse existing Dockerfile) ----------
  bpm-service:
    build:
      context: ./bpm-service
      dockerfile: Dockerfile
    container_name: lowcode-bpm
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-gin_vue_admin}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/bpm/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - lowcode-net

volumes:
  postgres-data:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

networks:
  lowcode-net:
    driver: bridge
