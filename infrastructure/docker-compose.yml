version: "3.8"

# =============================================================
# gin-vue-admin + BPM Service (Flowable) full-stack deployment
# =============================================================
# Usage:
#   docker-compose up -d          # start all services
#   docker-compose logs -f bpm    # watch BPM service logs
#   docker-compose down -v        # stop and remove volumes
# =============================================================

x-common-env: &common-env
  TZ: "Asia/Shanghai"

services:
  # ---------- MySQL 8 ----------
  mysql:
    image: mysql:8.0
    container_name: gva-mysql
    restart: unless-stopped
    environment:
      <<: *common-env
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "gin_vue_admin"
      MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
      MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d  # auto-run on first start
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gva-net

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: gva-redis
    restart: unless-stopped
    # Note: port 6379 NOT mapped to host — Redis is internal-only.
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gva-net

  # ---------- BPM Service (Java / Spring Boot + Flowable) ----------
  bpm-service:
    build:
      context: ./bpm-service
      dockerfile: Dockerfile
    container_name: gva-bpm
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/gin_vue_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_SQL_INIT_MODE: "never"  # schema already loaded by MySQL init scripts
    # Note: port 8090 NOT mapped to host — bpm-service is internal-only.
    # Accessible only via Docker network (gin-server -> bpm-service:8090).
    # Remove the port mapping to prevent auth bypass via direct header spoofing.
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/bpm/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - gva-net

  # ---------- Go Backend (gin-vue-admin server) ----------
  gin-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gva-server
    restart: unless-stopped
    environment:
      <<: *common-env
      GVA_CONFIG: "config.docker.yaml"
    ports:
      - "8888:8888"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      bpm-service:
        condition: service_healthy
    volumes:
      - ./server/config.docker.yaml:/go/src/github.com/flipped-aurora/gin-vue-admin/server/config.docker.yaml:ro
      - server-uploads:/go/src/github.com/flipped-aurora/gin-vue-admin/server/resource
    networks:
      - gva-net

  # ---------- Vue Frontend (nginx) ----------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: gva-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - gin-server
      - bpm-service
    networks:
      - gva-net

# ---------- Volumes ----------
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  server-uploads:
    driver: local

# ---------- Network ----------
networks:
  gva-net:
    driver: bridge
