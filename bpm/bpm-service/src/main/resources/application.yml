server:
  port: 8090
  servlet:
    context-path: /bpm

spring:
  application:
    name: bpm-service
  datasource:
    url: jdbc:mysql://localhost:3306/gin_vue_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8mb4
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/seed.sql

flowable:
  database-schema-update: true
  async-executor-activate: false

logging:
  level:
    com.example.bpm: INFO
    org.flowable: WARN
